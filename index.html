<html lang="vi"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quản lý kho Plus · v2.9 FULL CHÚ THÍCH</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  :root { 
    --paper: #f0f2f4; --paper-2: #e6e2d4; --ink: #1c1b17;
    --muted: #8a8579; --rule: #c9c3b2; --accent: #6a5b1f;
    --good: #3f6b3c; --bad: #8c2f24; --scan: #2b50a0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: "Instrument Sans", sans-serif; }
  
  /* HIỆU ỨNG: Lớp nhám bề mặt cho giao diện trông chuyên nghiệp */
  .grain { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.5; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"); }
  
  header.top { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; padding: 30px 40px; border-bottom: 1px solid var(--rule); }
  .brand h1 { font-family: "Instrument Serif", serif; font-style: italic; font-size: 50px; margin: 0; line-height: 1; }
  
  main { position: relative; z-index: 2; padding: 30px 40px; display: grid; gap: 25px; }

  /* KHU VỰC NHẬP LIỆU: Bố trí các ô nhập và nút bấm */
  .quick-action-wrapper {
    background: rgba(255,255,255,0.4); border: 1px solid var(--accent); padding: 20px;
    display: grid; grid-template-columns: repeat(3, 1fr) 0.8fr 1.2fr auto auto; gap: 15px; align-items: end;
  }
  .input-group { display: flex; flex-direction: column; gap: 8px; }
  .input-group label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }
  .quick-action-wrapper input, .quick-action-wrapper select { padding: 12px; border: 1px solid var(--rule); font-family: "JetBrains Mono"; border-radius: 4px; width: 100%; }
  
  /* NÚT BẤM: Xác nhận và Scan */
  .btn-submit { background: var(--accent); color: white; border: none; padding: 0 20px; cursor: pointer; font-weight: 600; border-radius: 4px; height: 45px; }
  .btn-scan { background: var(--scan); color: white; border: none; padding: 0 20px; cursor: pointer; font-weight: 600; border-radius: 4px; height: 45px; display: flex; align-items: center; gap: 5px; }
  .btn-submit:hover, .btn-scan:hover { opacity: 0.8; }

  /* KPI: 4 ô hiển thị số liệu tổng quát */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); border: 10px solid var(--rule); }
  .kpi { padding: 25px; border-right: 1px solid var(--rule); background: rgba(255,255,255,0.2); }
  .kpi .value { font-size: 60px; line-height: 1; font-weight: 600; margin-top: 10px; }

  .panels { display: grid; grid-template-columns: 1.2fr 1.2fr 0.8fr; gap: 20px; }
  .panel { border: 1px solid var(--rule); background: rgba(255,255,255,0.35); border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
  
  /* BẢNG TỒN KHO CHI TIẾT */
  table { width: 100%; border-collapse: collapse; font-family: "JetBrains Mono"; font-size: 13px; }
  thead th { background: var(--paper-2); padding: 12px; text-align: left; border-bottom: 1px solid var(--rule); position: sticky; top: 0; }
  tbody td { padding: 12px; border-bottom: 1px dashed var(--rule); }

  /* HOẠT ĐỘNG: Lịch sử nhập xuất */
  .move-item { position: relative; padding: 15px; border-bottom: 1px dashed var(--rule); font-family: "JetBrains Mono"; font-size: 12px; }
  .btn-del-act { position: absolute; right: 10px; top: 15px; color: var(--bad); cursor: pointer; border: none; background: none; font-size: 18px; opacity: 0.4; }
  
  /* CAMERA: Vùng hiển thị khi quét mã */
  #reader { width: 100%; max-width: 500px; margin: 0 auto; display: none; border: 5px solid var(--accent); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="grain"></div>
<header class="top">
  <div class="brand"><div style="font-size: 11px; letter-spacing: 2px;">HỆ THỐNG QUẢN TRỊ</div><h1>Kho vận <em>/ Operations</em></h1></div>
  <div style="font-family: 'JetBrains Mono'; font-size: 13px;">Cập nhật: <span id="lastUpdate" style="font-weight:bold;">--:--</span></div>
</header>

<main>
  <div id="reader"></div>

  <section class="quick-action-wrapper">
    <div class="input-group"><label>Mã SKU</label><input type="text" id="act-sku" placeholder="Nhập hoặc quét..." oninput="autoFillInfo()"></div>
    <div class="input-group"><label>Người làm</label><input type="text" id="act-user" placeholder="Tên..."></div>
    <div class="input-group"><label>Vị trí</label><input type="text" id="act-loc" placeholder="Kệ..."></div>
    <div class="input-group"><label>Số lượng</label><input type="number" id="act-qty" placeholder="SL"></div>
    <div class="input-group"><label>Xuất Nhập Kho</label>
      <select id="act-type">
        <option value="IN">NHẬP KHO (+)</option>
        <option value="OUT">XUẤT KHO (-)</option>
      </select>
    </div>
    <button class="btn-scan" onclick="startScan()">📷 SCAN</button>
    <button class="btn-submit" onclick="handleTransaction()">XÁC NHẬN</button>
  </section>

  <section class="kpis">
    <div class="kpi"><div class="label">SKU</div><div id="kpi-sku" class="value">0</div></div>
    <div class="kpi"><div class="label">Tổng Tồn</div><div id="kpi-stock" class="value">0</div></div>
    <div class="kpi"><div class="label">Cảnh báo</div><div id="kpi-low" class="value" style="color:orange">0</div></div>
    <div class="kpi"><div class="label">Hết hàng</div><div id="kpi-out" class="value" style="color:var(--bad)">0</div></div>
  </section>

  <section class="panels">
    <div class="panel">
      <div style="padding:15px; border-bottom:1px solid var(--rule); display:flex; justify-content:space-between; align-items:center;">
        <b>TỒN KHO CHI TIẾT</b>
        <input type="text" id="q" placeholder="Lọc..." style="padding:4px; width:80px;">
      </div>
      <div style="height: 450px; overflow-y: auto;">
        <table><thead><tr><th>SKU</th><th>VỊ TRÍ</th><th>TỒN</th></tr></thead><tbody id="rows"></tbody></table>
      </div>
    </div>

    <div class="panel">
      <div style="padding:15px; border-bottom:1px solid var(--rule); display:flex; justify-content:space-between; align-items:center;">
        <b>THỐNG KÊ VỊ TRÍ</b>
        <input type="date" id="chartDate" onchange="updateChart()" style="padding:4px; font-family:monospace;">
      </div>
      <div style="height:400px; padding:20px;"><canvas id="locationChart"></canvas></div>
    </div>

    <div class="panel">
      <div style="padding:15px; border-bottom:1px solid var(--rule); font-weight:bold;">HOẠT ĐỘNG</div>
      <div id="moveList" style="height: 450px; overflow-y: auto;"></div>
    </div>
  </section>
</main>

<script>
// LIÊN KẾT: Đường dẫn API kết nối Google Sheets của bạn
const API = "https://script.google.com/macros/s/AKfycbyRIsCr-6vHgoJEf0m2ikHfcxjHz0LfkQ91Q8qtEoOj6owdi-44HVxVaF6AD6HIM_aA/exec";
let state = { items: [], moves: [] };
let myChart = null;
Chart.register(ChartDataLabels);

// --- 1. CHỨC NĂNG QUÉT MÃ (SCAN) ---
let html5QrCode;
function startScan() {
  const reader = document.getElementById('reader');
  reader.style.display = 'block';
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" }, // Ưu tiên dùng camera sau
    { fps: 10, qrbox: { width: 250, height: 150 } },
    (decodedText) => {
      document.getElementById('act-sku').value = decodedText;
      autoFillInfo(); // Tự tìm vị trí kệ ngay sau khi quét được mã
      stopScan();
    },
    (errorMessage) => {}
  ).catch(err => { alert("Lỗi camera: Hãy cho phép trang web truy cập máy ảnh."); });
}

function stopScan() {
  if(html5QrCode) {
    html5QrCode.stop().then(() => {
      document.getElementById('reader').style.display = 'none';
    });
  }
}

// --- 2. TẢI DỮ LIỆU TỪ GOOGLE SHEETS ---
async function loadData() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    // Chuyển đổi dữ liệu tồn kho
    state.items = (data.items || data).map(it => ({
      sku: String(it.sku || it.SKU || "").trim(),
      location: String(it.location || it.loc || "KHO").trim(),
      stock: Number(it.toncuoi || it.stock || 0)
    })).filter(it => it.sku !== "");
    // Chuyển đổi dữ liệu lịch sử
    state.moves = (data.moves || []).map(m => ({ ...m, sku: String(m.sku || "").trim() }));
    render();
    updateChart();
    document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
  } catch (e) { console.error("Lỗi đồng bộ dữ liệu:", e); }
}

// --- 3. HIỂN THỊ BẢNG VÀ KPI ---
function render() {
  const q = document.getElementById("q").value.toLowerCase();
  const filtered = state.items.filter(i => i.sku.toLowerCase().includes(q));
  document.getElementById("rows").innerHTML = filtered.map(i => `<tr><td>${i.sku}</td><td>${i.location}</td><td><b>${i.stock}</b></td></tr>`).join("");
  document.getElementById("kpi-sku").textContent = state.items.length;
  document.getElementById("kpi-stock").textContent = state.items.reduce((a, b) => a + b.stock, 0);
  document.getElementById("kpi-out").textContent = state.items.filter(i => i.stock <= 0).length;
  renderMoves();
}

// --- 4. HIỂN THỊ DANH SÁCH HOẠT ĐỘNG (BÊN PHẢI) ---
function renderMoves() {
  document.getElementById("moveList").innerHTML = state.moves.map(m => `
    <div class="move-item" style="${m.status === 'pending' ? 'background:#fff9e6' : ''}">
      <button class="btn-del-act" onclick="deleteItem('${m.sku}')">✖</button>
      <small style="color:var(--muted)">${m.time || ''}</small><br>
      <b>${m.sku}</b>: <span style="color:${m.type === 'IN' ? 'var(--good)' : 'var(--bad)'}">${m.type === 'IN' ? '▲' : '▼'} ${m.qty}</span>
    </div>`).join("");
}

// --- 5. VẼ BIỂU ĐỒ (ĐÃ SỬA LỖI TREO KHI CHỌN NGÀY) ---
function updateChart() {
  const ctx = document.getElementById('locationChart').getContext('2d');
  const selectedDate = document.getElementById('chartDate').value; 
  if (myChart) { myChart.destroy(); } // Xóa biểu đồ cũ để tránh lỗi chồng hình
  let locData = {};
  let labelTitle = "Tổng Tồn Hiện Tại";

  if (selectedDate) {
    // Xử lý thông minh để nhận diện ngày (ví dụ 22/04/2026 hoặc 22/4/2026)
    const [y, m, d] = selectedDate.split('-');
    const d1 = `${d}/${m}/${y}`, d2 = `${parseInt(d)}/${parseInt(m)}/${y}`;
    state.moves.forEach(move => {
      const t = String(move.time || "");
      if (t.includes(d1) || t.includes(d2) || t.includes(selectedDate)) {
        const l = move.location || move.loc || "KHO";
        const q = Number(move.qty || 0);
        locData[l] = (locData[l] || 0) + ((move.type === 'IN' || move.type === 'NHẬP') ? q : -q);
      }
    });
    labelTitle = "Biến Động Ngày: " + d2;
  } else {
    // Mặc định: Tổng tồn kho theo kệ
    state.items.forEach(it => { locData[it.location] = (locData[it.location] || 0) + it.stock; });
  }

  myChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(locData).length ? Object.keys(locData) : ["N/A"],
      datasets: [{
        label: labelTitle, data: Object.values(locData),
        backgroundColor: 'rgba(106, 91, 31, 0.7)', borderColor: '#6a5b1f', borderWidth: 1
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { datalabels: { anchor: 'end', align: 'top', color: '#1c1b17', font: { weight: 'bold' } } }
    }
  });
}

// --- 6. XÁC NHẬN GIAO DỊCH LÊN FILE GOOGLE ---
async function handleTransaction() {
  const sku = document.getElementById("act-sku").value.trim();
  const user = document.getElementById("act-user").value.trim();
  const loc = document.getElementById("act-loc").value.trim();
  const qty = document.getElementById("act-qty").value;
  const type = document.getElementById("act-type").value;
  if(!sku || !qty || !user) return alert("Vui lòng nhập đủ Mã SKU, Người làm và Số lượng!");
  
  // Hiện thị ảo trước để người dùng thấy ngay kết quả
  state.moves.unshift({ time: new Date().toLocaleString('vi-VN'), sku, user, qty, type, location: loc, status: 'pending' });
  renderMoves();
  
  // Gửi lệnh POST thực tế lên Google Sheets
  await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify({ sku, user, location: loc, qty, type, action: "TRANSACTION" }) });
  
  // Xóa trắng ô nhập sau khi xác nhận
  document.getElementById("act-sku").value = "";
  document.getElementById("act-qty").value = "";
  setTimeout(loadData, 2500); // Tải lại sau 2.5 giây để cập nhật số tồn mới
}

// --- 7. XÓA SKU KHỎI DANH SÁCH ---
async function deleteItem(sku) {
  if (!confirm(`Bạn có chắc muốn xóa SKU ${sku}?`)) return;
  await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify({ sku, action: "DELETE" }) });
  setTimeout(loadData, 2000);
}

// --- 8. TỰ ĐIỀN VỊ TRÍ KỆ KHI GÕ SKU ---
function autoFillInfo() {
  const sku = document.getElementById("act-sku").value.trim().toLowerCase();
  const item = state.items.find(i => i.sku.toLowerCase() === sku);
  if (item) document.getElementById("act-loc").value = item.location;
}

// KHỞI CHẠY: Lắng nghe tìm kiếm, tải dữ liệu lần đầu và hẹn giờ tự cập nhật
document.getElementById("q").addEventListener("input", render);
loadData();
setInterval(loadData, 60000); // Tự động làm mới dữ liệu sau mỗi 60 giây
</script>
</body></html>
